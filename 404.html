<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | The Wed 24</title>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" type="image/png" href="assets/the_wed_24_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #0b0b0b;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            z-index: 10;
        }

        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(6rem, 15vw, 12rem);
            line-height: 1;
            margin-bottom: 1rem;
            color: var(--color-primary, #c9a96e);
            opacity: 0.8;
            font-style: italic;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 3rem;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .home-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border: 1px solid var(--color-primary, #c9a96e);
            color: var(--color-primary, #c9a96e);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            transition: all 0.4s ease;
        }

        .home-btn:hover {
            background-color: var(--color-primary, #c9a96e);
            color: #000;
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(201, 169, 110, 0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Scene Not Found</h1>
        <p>The moment you're looking for seems to have slipped through the frame. Let's return to the narrative.</p>
        <div class="btn-container">
            <a href="index.html" class="home-btn">Return Home</a>
        </div>
    </div>
</body>
</html>
